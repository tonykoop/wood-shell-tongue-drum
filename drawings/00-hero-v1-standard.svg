<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="Inter, Arial, sans-serif">
  <title>V1 Standard 16in - Side Section A-A - Wood Shell Tongue Drum</title>
  <desc>Heifer Zephyr Instruments / Tony Koop / Wood Shell Tongue Drum / V1 Cylinder + Flat Top, Standard 16in / Sheet 02 / Section A-A</desc>

  <defs>
    <pattern id="walnut" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)">
      <rect width="8" height="8" fill="#5b3a1c"/>
      <line x1="0" y1="0" x2="0" y2="8" stroke="#3d260f" stroke-width="0.6"/>
    </pattern>
    <pattern id="padauk" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)">
      <rect width="8" height="8" fill="#b8541c"/>
      <line x1="0" y1="0" x2="0" y2="8" stroke="#7a3712" stroke-width="0.6"/>
    </pattern>
    <pattern id="cavity" patternUnits="userSpaceOnUse" width="6" height="6">
      <rect width="6" height="6" fill="#fffaf0"/>
      <line x1="0" y1="0" x2="6" y2="6" stroke="#d6cfb8" stroke-width="0.4"/>
    </pattern>
  </defs>

  <!-- Frame -->
  <rect x="0" y="0" width="800" height="600" fill="#fffaf0"/>
  <rect x="20" y="20" width="760" height="560" fill="none" stroke="#2b2417" stroke-width="1.5"/>

  <!-- Title strip -->
  <text x="40" y="55" font-size="22" font-weight="600" fill="#2b2417">Wood Shell Tongue Drum &#x2014; V1 Standard 16&#8243; &#x2014; Section A-A</text>
  <text x="40" y="78" font-size="13" fill="#6b4f2c">Recommended first prototype &#x2022; Cylinder body + flat top &#x2022; A Kurd, A3 ding (220 Hz)</text>
  <line x1="40" y1="92" x2="760" y2="92" stroke="#6b4f2c" stroke-width="0.8"/>

  <!-- Section view: side-section of the drum (rotated 90deg = looking at cylinder side wall) -->
  <!-- Use a coordinate system where 1 inch = 25 px, drum centered at x=400, top of soundboard at y=180 -->
  <!-- Drum dims: OD 16in -> 400 px wide, height 8in -> 200 px, soundboard 0.375in -> 9.4 px, wall 0.625in -> 15.6 px -->

  <g transform="translate(0,0)">
    <!-- Outer shell wall (left + right slabs) -->
    <rect x="200" y="180" width="15" height="200" fill="url(#walnut)" stroke="#2b2417" stroke-width="1"/>
    <rect x="585" y="180" width="15" height="200" fill="url(#walnut)" stroke="#2b2417" stroke-width="1"/>
    <!-- Shell bottom (closed) -->
    <rect x="200" y="365" width="400" height="15" fill="url(#walnut)" stroke="#2b2417" stroke-width="1"/>
    <!-- Soundboard with rabbet sitting flush on rim -->
    <rect x="200" y="180" width="400" height="9" fill="url(#padauk)" stroke="#2b2417" stroke-width="1"/>
    <!-- Rabbet pockets in the wall (recess that holds the soundboard) -->
    <rect x="215" y="180" width="9" height="6" fill="#fffaf0" stroke="#2b2417" stroke-width="0.6"/>
    <rect x="576" y="180" width="9" height="6" fill="#fffaf0" stroke="#2b2417" stroke-width="0.6"/>

    <!-- Cavity fill -->
    <rect x="215" y="189" width="370" height="176" fill="url(#cavity)"/>

    <!-- Tongue slits (drawn as 3 visible slits in section, marked) -->
    <line x1="290" y1="180" x2="290" y2="189" stroke="#2b2417" stroke-width="2"/>
    <line x1="400" y1="180" x2="400" y2="189" stroke="#2b2417" stroke-width="2"/>
    <line x1="510" y1="180" x2="510" y2="189" stroke="#2b2417" stroke-width="2"/>

    <!-- Gu port -->
    <circle cx="400" cy="372" r="32" fill="#fffaf0" stroke="#2b2417" stroke-width="1.5"/>
    <circle cx="400" cy="372" r="32" fill="none" stroke="#2b2417" stroke-width="0.5" stroke-dasharray="3 3"/>

    <!-- Dimensions: shell OD -->
    <line x1="200" y1="430" x2="600" y2="430" stroke="#2b2417" stroke-width="0.8"/>
    <line x1="200" y1="425" x2="200" y2="435" stroke="#2b2417" stroke-width="0.8"/>
    <line x1="600" y1="425" x2="600" y2="435" stroke="#2b2417" stroke-width="0.8"/>
    <text x="400" y="448" font-size="13" text-anchor="middle" fill="#2b2417" font-weight="600">16.000&#8243; OD &#xb1; 0.020&#8243;</text>

    <!-- Shell ID -->
    <line x1="215" y1="410" x2="585" y2="410" stroke="#6b4f2c" stroke-width="0.6"/>
    <line x1="215" y1="406" x2="215" y2="414" stroke="#6b4f2c" stroke-width="0.6"/>
    <line x1="585" y1="406" x2="585" y2="414" stroke="#6b4f2c" stroke-width="0.6"/>
    <text x="400" y="404" font-size="11" text-anchor="middle" fill="#6b4f2c">14.750&#8243; ID</text>

    <!-- Wall thickness -->
    <line x1="160" y1="200" x2="195" y2="200" stroke="#2b2417" stroke-width="0.6"/>
    <text x="155" y="204" font-size="11" text-anchor="end" fill="#2b2417">0.625&#8243; wall</text>

    <!-- Shell height -->
    <line x1="640" y1="180" x2="640" y2="380" stroke="#2b2417" stroke-width="0.8"/>
    <line x1="635" y1="180" x2="645" y2="180" stroke="#2b2417" stroke-width="0.8"/>
    <line x1="635" y1="380" x2="645" y2="380" stroke="#2b2417" stroke-width="0.8"/>
    <text x="652" y="285" font-size="13" fill="#2b2417" font-weight="600">8.000&#8243; H</text>

    <!-- Soundboard thickness -->
    <line x1="640" y1="180" x2="640" y2="189" stroke="#b8541c" stroke-width="1"/>
    <text x="690" y="187" font-size="11" fill="#b8541c">0.375&#8243; t (Padauk)</text>

    <!-- Rabbet detail callout -->
    <line x1="220" y1="183" x2="105" y2="125" stroke="#2b2417" stroke-width="0.5"/>
    <circle cx="220" cy="183" r="2" fill="#2b2417"/>
    <text x="40" y="118" font-size="11" fill="#2b2417">Rabbet 1/4&#8243; deep &#xd7; 3/8&#8243; wide</text>
    <text x="40" y="132" font-size="10" fill="#6b4f2c">slip-fit 0.005&#8243; clearance, glued</text>

    <!-- Gu port callout -->
    <line x1="400" y1="372" x2="400" y2="500" stroke="#2b2417" stroke-width="0.5" stroke-dasharray="2 3"/>
    <text x="400" y="515" font-size="12" text-anchor="middle" fill="#2b2417" font-weight="600">Gu port &#x2300; 2.500&#8243; nominal</text>
    <text x="400" y="529" font-size="10" text-anchor="middle" fill="#6b4f2c">final size set in shop by Helmholtz tuning</text>

    <!-- Tongue slit callout -->
    <line x1="510" y1="184" x2="650" y2="100" stroke="#2b2417" stroke-width="0.5"/>
    <circle cx="510" cy="184" r="2" fill="#2b2417"/>
    <text x="660" y="100" font-size="11" fill="#2b2417">Slit kerf 0.125&#8243; &#xb1; 0.005&#8243;</text>
    <text x="660" y="113" font-size="10" fill="#6b4f2c">11 slits, A Kurd zigzag layout</text>

    <!-- Predicted Helmholtz frequency text -->
    <text x="60" y="380" font-size="12" fill="#2b2417" font-weight="600">Cavity</text>
    <text x="60" y="396" font-size="11" fill="#2b2417">V = &#x3c0; r&#xb2; H = 1608.5 in&#xb3;</text>
    <text x="60" y="411" font-size="11" fill="#2b2417">A = 4.91 in&#xb2;, L_neck = 0.375&#8243;</text>
    <text x="60" y="426" font-size="12" fill="#b8541c" font-weight="600">Predicted f_H = 194.6 Hz</text>
    <text x="60" y="440" font-size="11" fill="#6b4f2c">ratio f_H / f_ding = 0.88 (coupled)</text>
  </g>

  <!-- Title block (lower right) -->
  <g transform="translate(540, 510)">
    <rect x="0" y="0" width="220" height="68" fill="#fffaf0" stroke="#2b2417" stroke-width="1"/>
    <line x1="0" y1="22" x2="220" y2="22" stroke="#2b2417" stroke-width="0.5"/>
    <line x1="0" y1="44" x2="220" y2="44" stroke="#2b2417" stroke-width="0.5"/>
    <line x1="110" y1="22" x2="110" y2="68" stroke="#2b2417" stroke-width="0.5"/>
    <text x="6" y="16" font-size="11" font-weight="600">Heifer Zephyr Instruments</text>
    <text x="6" y="36" font-size="10">Wood Shell Tongue Drum</text>
    <text x="6" y="58" font-size="10">Sheet 02 / 9</text>
    <text x="116" y="36" font-size="10">V1 Std Section A-A</text>
    <text x="116" y="58" font-size="10">Rev A &#x2022; 2026-05-07</text>
  </g>

  <!-- Status banner -->
  <g transform="translate(40, 510)">
    <rect x="0" y="0" width="320" height="56" fill="#fffaf0" stroke="#b8541c" stroke-width="1" stroke-dasharray="4 4"/>
    <text x="10" y="18" font-size="11" font-weight="600" fill="#b8541c">PLACEHOLDER &#x2022; Pre-prototype</text>
    <text x="10" y="34" font-size="10" fill="#2b2417">Auto-generated from workbook formulas. Refresh after</text>
    <text x="10" y="48" font-size="10" fill="#2b2417">first prototype calibration via scripts/generate_drawings.py.</text>
  </g>
</svg>
